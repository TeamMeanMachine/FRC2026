import edu.wpi.first.gradlerio.GradleRIOPlugin
import groovy.json.JsonSlurper

plugins {
    id "java"
    id "edu.wpi.first.GradleRIO2027" version "2027.0.0-alpha-2"
    id "org.jetbrains.kotlin.jvm" version "2.2.0"
    id "org.jetbrains.kotlin.kapt" version "2.2.0"
    id "idea"
}

wpi.maven.useLocal = true
wpi.maven.useDevelopment = false
wpi.versions.wpilibVersion = '2027.0.0-alpha-3'

java {
}

def ROBOT_MAIN_CLASS = "frc.team2471.frc2026.Main"

// Define my targets (RoboRIO) and artifacts (deployable files)
// This is added by GradleRIO"s backing project DeployUtils.
deploy {
    targets {
        systemcore(getTargetTypeClass('SystemCore')) {
            // Team number is loaded either from the .wpilib/wpilib_preferences.json
            // or from command line. If not found an exception will be thrown.
            // You can use getTeamOrDefault(team) instead of getTeamNumber if you
            // want to store a team number in this file.
            team = 2471
            debug = project.frc.getDebugOrDefault(false)

            artifacts {
                // First part is artifact name, 2nd is artifact type
                // getTargetTypeClass is a shortcut to get the class type using a string

                frcJava(getArtifactTypeClass('FRCJavaArtifact')) {
                }

                // Static files artifact
                frcStaticFileDeploy(getArtifactTypeClass('FileTreeArtifact')) {
                    files = project.fileTree('src/main/deploy')
                    directory = '/home/systemcore/deploy'
                    deleteOldFiles = true // Change to true to delete files on systemcore that no
                    // longer exist in deploy directory of this project
                }
            }
        }
    }
}

// Automatically download documentation from libraries
idea {
    module {
        downloadJavadoc = true
        downloadSources = true
    }
}

def deployArtifact = deploy.targets.systemcore.artifacts.frcJava

// Set to true to use debug for JNI.
wpi.java.debugJni = false

// Set this to true to enable desktop support.
def includeDesktopSupport = true

// Configuration for AdvantageKit
task(replayWatch, type: JavaExec) {
    mainClass = "org.littletonrobotics.junction.ReplayWatch"
    classpath = sourceSets.main.runtimeClasspath
}

// Defining my dependencies. In this case, WPILib (+ friends), and vendor libraries.
// Also defines JUnit 4.
dependencies {
    implementation(project(":meanlib"))


    annotationProcessor wpi.java.deps.wpilibAnnotations()
    implementation wpi.java.deps.wpilib()
    implementation wpi.java.vendor.java()

    systemcoreDebug wpi.java.deps.wpilibJniDebug(wpi.platforms.systemcore)
    systemcoreDebug wpi.java.vendor.jniDebug(wpi.platforms.systemcore)

    systemcoreRelease wpi.java.deps.wpilibJniRelease(wpi.platforms.systemcore)
    systemcoreRelease wpi.java.vendor.jniRelease(wpi.platforms.systemcore)

    nativeDebug wpi.java.deps.wpilibJniDebug(wpi.platforms.desktop)
    nativeDebug wpi.java.vendor.jniDebug(wpi.platforms.desktop)
    simulationDebug wpi.sim.enableDebug()

    nativeRelease wpi.java.deps.wpilibJniRelease(wpi.platforms.desktop)
    nativeRelease wpi.java.vendor.jniRelease(wpi.platforms.desktop)
    simulationRelease wpi.sim.enableRelease()

    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.9.0"

    testImplementation "org.junit.jupiter:junit-jupiter:5.10.1"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"

    implementation group: 'org.apache.commons', name: 'commons-math3', version: '3.6.1'

    implementation "org.jetbrains.kotlin:kotlin-reflect"
    implementation "org.jetbrains.kotlin:kotlin-stdlib"

    def akitJson = new JsonSlurper().parseText(new File(projectDir.getAbsolutePath() + "/vendordeps/AdvantageKit.json").text)
    kapt "org.littletonrobotics.akit:akit-autolog:$akitJson.version"
//    kapt "edu.wpi.first.epilogue:epilogue-processor-java:2026.2.2"
}

test {
    useJUnitPlatform()
    systemProperty "junit.jupiter.extensions.autodetection.enabled", "true"
}

// Simulation configuration (e.g. environment variables).
//
// The sim GUI is *disabled* by default to support running
// AdvantageKit log replay from the command line. Set the
// value to "true" to enable the sim GUI by default (this
// is the standard WPILib behavior).
wpi.sim.addGui().defaultEnabled = true
wpi.sim.addDriverstation()

// Setting up my Jar File. In this case, adding all libraries into the main jar ("fat jar")
// in order to make them all available at runtime. Also adding the manifest so WPILib
// knows where to look for our Robot Class.
jar {
    dependsOn(':meanlib:jar')
    from { configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) } }
    from sourceSets.main.allSource
    manifest GradleRIOPlugin.javaManifest(ROBOT_MAIN_CLASS)
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

def copyVendordeps = {
    subprojects {
        def vendordepsDir = file("$projectDir/vendordeps")
        if (vendordepsDir.exists()) {
            rootProject.copy {
                from vendordepsDir
                into "${rootProject.projectDir}/vendordeps"
                include '*.json'
            }
        }
    }
}

gradle.projectsEvaluated {
    copyVendordeps()
}

tasks.matching { it.name == "build" }.all {
    doFirst {
        copyVendordeps()
    }
}

tasks.matching { it.name == "deploy" }.all {
    doFirst {
        copyVendordeps()
    }
}


// Configure jar and deploy tasks
deployArtifact.jarTask = jar
wpi.java.configureExecutableTasks(jar)
wpi.java.configureTestTasks(test)

// Configure string concat to always inline compile
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs.add "-XDstringConcat=inline"
}

tasks.register('printHubCurves', JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'frc.team2471.frc2026.tests.PrintHubCurves'

    systemProperty 'java.library.path', "${projectDir}/build/jni/release"
}

tasks.register('printPassCurves', JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'frc.team2471.frc2026.tests.PrintPassCurves'

    systemProperty 'java.library.path', "${projectDir}/build/jni/release"
}

repositories {
    mavenLocal()
    mavenCentral()
    maven {
        name = "wpilib"
        url = uri("${System.getProperty('user.home')}/repository/org/")
    }
}
kotlin {
    jvmToolchain(24)
}
